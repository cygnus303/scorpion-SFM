<div class="login-container">
  <div class="login-card">
    <!-- Logo Section -->
    <div class="login-logo">
      <div class="logo">
        <span class="scorp">Scorp</span><span class="force">Force</span>
      </div>
      <div class="logo-subtitle">Sales Force Module</div>
    </div>

    <!-- Login Form -->
    <div class="login-form">
      <h2>Welcome Back</h2>
      <p class="login-subtitle">Sign in to access your dashboard</p>

      <form class="form">
        <div class="form-group">
          <label for="email">Username</label>
          <div class="input-group">
            <input type="text" placeholder="Enter your username" > 
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-group">
            <input  [type]="showPassword ? 'text' : 'password'" placeholder="Enter your password">
            <div class="input-icon password-toggle" (click)="togglePassword()">
               <i class="align-middle" [ngClass]="showPassword ? '👁️': '🙈'"></i>
            </div>    
          </div>
        </div>


        <button type="submit" class="btn-login" (click)="login()">
          Login
          <span class="btn-arrow">→</span>
        </button>
      </form>

     
  </div>
</div>
