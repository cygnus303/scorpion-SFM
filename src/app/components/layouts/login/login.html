<div class="login-container">
  <div class="login-card">
    <!-- Logo Section -->
    <div class="login-logo">
      <div class="logo">
        <span class="scorp">Scorp</span><span class="force">Force</span>
      </div>
      <div class="logo-subtitle">Sales Force Module</div>
    </div>

    <!-- Login Form -->
    <div class="login-form">
      <h2>Welcome Back</h2>
      <p class="login-subtitle">Sign in to access your dashboard</p>

      <form [formGroup]="loginForm" class="form">
        <div class="form-group">
          <label for="email">Username</label>
          <div class="input-group">
            <input type="text" formControlName="username" placeholder="Enter your username" 
                   [class.error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          </div>
          <div class="text-danger pt-2" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
            <span *ngIf="loginForm.get('username')?.errors?.['required']">Username is required</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-group">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Enter your password"
                   [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <div class="input-icon password-toggle" (click)="togglePassword()">
              <div class="password-icon">
                <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </div>
            </div>
          </div>
          <div class="text-danger pt-2" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
          </div>
        </div>


        <button type="submit" class="btn-login" (click)="login()" [disabled]="loading">
          <ng-container *ngIf="!loading; else loadingTemplate">
            Log In
            <span class="btn-arrow">→</span>
          </ng-container>
          <ng-template #loadingTemplate>
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Loading...
          </ng-template>
        </button>
      </form>


    </div>
  </div>
