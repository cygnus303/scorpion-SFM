<div class="topbar">
  <button class="menu-toggle" (click)="toggleSidebar()" style="background: transparent; border: none; padding: 8px; cursor: pointer; border-radius: 8px; transition: all 0.2s ease;" onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background='transparent'">
    <ng-container *ngIf="isSidebarCollapsed(); else sidebarExpanded">
      <svg width="24" height="24"  fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </ng-container>
    <ng-template #sidebarExpanded>
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="15" y2="18"></line>
      </svg>
    </ng-template>
  </button>
  <div>
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div class="topbar-sub" id="page-sub">All Modules Overview</div>
  </div>
  <div class="tsp"></div>
  <div class="tc on" id="filter-today" onclick="setFilter('today')">Today</div>
  <div class="tc" id="filter-week" onclick="setFilter('week')">This Week</div>
  <div class="tc" id="filter-month" onclick="setFilter('month')">This Month</div>
  <button class="tbtn" id="topbar-action" onclick="openModal()">＋ New Lead</button>
  <div class="upill">
    <div class="av">MK</div>
    <div>
      <div class="un">Manoj Kumar</div>
      <div class="ur">CTO · 3673</div>
    </div>
  </div>
</div>
