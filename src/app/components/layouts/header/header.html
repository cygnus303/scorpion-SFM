<div class="topbar">
  <button class="menu-toggle" (click)="toggleSidebar()"
    style="background: transparent; border: none; padding: 8px; cursor: pointer; border-radius: 8px; transition: all 0.2s ease;"
    onmouseover="this.style.background='#f8f9fa'" onmouseout="this.style.background='transparent'">
    <ng-container *ngIf="isSidebarCollapsed(); else sidebarExpanded">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
        stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </ng-container>
    <ng-template #sidebarExpanded>
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="15" y2="18"></line>
      </svg>
    </ng-template>
  </button>
  <div>
    <div class="topbar-title" id="page-title">{{ headerTitle$ | async }}</div>
  </div>
  <div class="tsp"></div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" [(ngModel)]="searchQuery" (input)="onSearch()" placeholder="Search here...">
  </div>
  <div class="tc" [class.on]="activeQuickFilter === 'today'" (click)="setFilter('today')">Today</div>
  <div class="tc" [class.on]="activeQuickFilter === 'week'" (click)="setFilter('week')">This Week</div>
  <div class="tc" [class.on]="activeQuickFilter === 'month'" (click)="setFilter('month')">This Month</div>
  <app-date-range-picker id="topbar-action" [bsValue]="selectedDateRange"
    (dateSelected)="onDateSelected($event)"></app-date-range-picker>
  <div class="upill" (click)="toggleDropdown()">
    <div class="av">{{ userInfo?.name?.substring(0,2)?.toUpperCase() || 'U' }}</div>
    <div>
      <div class="un">{{ userInfo?.emailId || 'User' }}</div>
      <div class="ur">{{ userInfo?.designation || 'User' }} · {{ userInfo?.userId || 'ID' }}</div>
    </div>
    <div class="dropdown-menu" [class.show]="showDropdown" (click)="$event.stopPropagation()">
      <div class="dropdown-item" (click)="logout()">
        <span>Logout</span>
      </div>
    </div>
  </div>
</div>
